infos:
    beneficiary-phone: "Tél\_:"
    beneficiary-email: "E-mail\_:"
    created-by: "Créé par\_: {author}"
    request-date: "Date de la demande\_: {date}"
    manager: "Chef de projet\_: {manager}"
    mobilization-period: "Période de mobilisation\_: {period}"
    initially-planned-period: Initialement {period}
    overdue-since: En retard depuis {duration}
    late-return-on: Retourné le {date} (retard de {duration})
    with-technicians: "Avec\_:"
    warning-overdue: |
        Le retour du matériel de cet événement est en retard.
        Il aurait dû être retourné avant le {date} (il y a {duration}).

materials:
    problems-on-returned-materials: Problèmes sur le matériel retourné
    all-material-returned: Tout le matériel a bien été retourné pour cet événement.
    view-return-inventory: Voir l'inventaire de retour en détail

    not-returned-material-count:
        - "{returned} retourné sur {out}\_! Il en manque {missing}."
        - "{returned} retournés sur {out}\_! Il en manque {missing}."

    broken-material-count:
        - "{broken} revenu en panne\_!"
        - "{broken} revenus en panne\_!"

estimates:
    no-estimate-help: Il n'y a aucun devis pour le moment.
    no-beneficiary-billable-help: >-
        Vous ne pouvez pas créer de devis pour un événement qui n'a pas de bénéficiaire.
    contact-someone-to-create-estimate: >-
        Si besoin, contactez un membre de l'équipe pour lui demander d'éditer un devis.

    actions:
        create:
            label: Créer un devis...
            help: >-
                Vous pouvez créer un devis au nom du premier bénéficiaire de l'événement
                en cliquant sur le bouton ci-dessous.
        create-new:
            label: Créer un nouveau devis...
            help: >-
                Vous pouvez créer un nouveau devis en cliquant sur le bouton ci-dessous.

    warnings:
        beneficiary-not-invoiceable:
            message:
                with-estimates:
                    "Le bénéficiaire «\_{name}\_» a des données de facturation incomplètes ou invalides.\n
                    Pour pouvoir générer un nouveau devis, veuillez compléter ou corriger ses données."
                without-estimates:
                    "Le bénéficiaire «\_{name}\_» a des données de facturation incomplètes ou invalides.\n
                    Pour pouvoir générer un devis, veuillez compléter ou corriger ses données."
            action: Modifier sa fiche

        empty:
            message: |-
                La facturation de cet événement ne contient aucune ligne affichée.
                Pour pouvoir générer un devis, veuillez ajouter du matériel ou des lignes depuis l'éditeur.
            action: Modifier la facturation

    item:
        title:
            with-number: "Devis n°\_{number}"
            without-number: "Devis du {date} à {hour}"

    modals:
        create:
            title: "Nouveau devis pour l'événement «\_{name}\_»"
            action: Créer le devis
            created: Le devis a bien été créé.
            fields:
                lang:
                    label: Langue du devis
                    options:
                        fr: Français
                        en: Anglais
                special-mentions: Mentions spéciales
                due-date:
                    label: Date d'échéance
                    placeholder: "Validité de {days} jours"

invoices:
    no-invoice-help: Il n'y a aucune facture pour le moment.
    no-beneficiary-billable-help: >-
        Vous ne pouvez pas créer de facture pour un événement qui n'a pas de bénéficiaire.
    contact-someone-to-create-invoice: >-
        Si besoin, contactez un membre de l'équipe pour lui demander d'éditer la facture.

    actions:
        create:
            label: Créer une facture...
            help: >-
                Vous pouvez créer une facture au nom du premier bénéficiaire de l'événement
                en cliquant sur le bouton ci-dessous.
        create-new:
            label: Créer une nouvelle facture...
            help: >-
                Vous pouvez créer une nouvelle facture en cliquant sur le bouton ci-dessous.

    warnings:
        beneficiary-not-invoiceable:
            message:
                with-invoices:
                    "Le bénéficiaire «\_{name}\_» a des données de facturation incomplètes ou invalides.\n
                    Pour pouvoir générer une nouvelle facture, veuillez compléter ou corriger ses données."
                without-invoices:
                    "Le bénéficiaire «\_{name}\_» a des données de facturation incomplètes ou invalides.\n
                    Pour pouvoir générer une facture, veuillez compléter ou corriger ses données."
            action: Modifier sa fiche

        empty:
            message: |-
                La facturation de cet événement ne contient aucune ligne affichée.
                Pour pouvoir générer une facture, veuillez ajouter du matériel ou des lignes depuis l'éditeur.
            action: Modifier la facturation

    item:
        title:
            invoice: "Facture n°\_{number}"
            correction: "Facture rectificative n°\_{number}"
            prepayment-invoice: "Facture d'acompte n°\_{number}"
            prepayment-credit-note: "Avoir n°\_{number}"
            credit-note: "Avoir n°\_{number}"

            draft:
                invoice: "Facture du {date} à {hour}"
                correction: "Facture rectificative du {date} à {hour}"
                prepayment-invoice: "Facture d'acompte du {date} à {hour}"
                prepayment-credit-note: "Avoir du {date} à {hour}"
                credit-note: "Avoir du {date} à {hour}"

    modals:
        create:
            title: "Nouvelle facture pour l'événement «\_{name}\_»"
            action: Créer la facture
            created: La facture a bien été créée.
            fields:
                order-number: Numéro de bon de commande
                special-mentions: Mentions spéciales
                lang:
                    label: Langue de la facture
                    options:
                        fr: Français
                        en: Anglais
                due-date:
                    label: Date d'échéance
                    placeholder:
                        immediately: Paiement à réception
                        with-delay:
                            - "Paiement sous {days} jour"
                            - "Paiement sous {days} jours"

documents:
    confirm-permanently-delete: "Voulez-vous vraiment supprimer définitivement ce document\_?"
    deleted: Document supprimé.

edit: Modifier l'événement
archive: Archiver l'événement
unarchive: Désarchiver l'événement
copy-url-release-sheet: Copier le lien permanent de cette fiche de sortie.

inventories-unavailable-help: >-
    L'événement contient des quantités en excédent, les inventaires ne
    peuvent pas être effectués tant que celles-ci n'auront pas été corrigées.
inventory-unavailable-help: >-
    L'événement contient des quantités en excédent, l'inventaire ne peut
    pas être effectué tant que celles-ci n'auront pas été corrigées.


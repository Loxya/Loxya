infos:
    beneficiary-phone: "Phone:"
    beneficiary-email: "Email:"
    created-by: "Created by: {author}"
    request-date: "Request date: {date}"
    manager: "Project manager: {manager}"
    mobilization-period: "Mobilization period: {period}"
    initially-planned-period: Initially {period}
    overdue-since: Overdue since {duration}
    late-return-on: Returned on {date} ({duration} late)
    with-technicians: "With\_:"
    warning-overdue: |
        The return of the equipment for this event is overdue.
        It should have been returned before the {date} ({duration} ago).

materials:
    problems-on-returned-materials: Problems on returned materials
    all-material-returned: All materials were returned for this event.
    view-return-inventory: View the return inventory in details

    not-returned-material-count:
        - "{returned} returned on {out}! Missing {missing}."
        - "{returned} returned on {out}! Missing {missing}."

    broken-material-count:
        - "{broken} returned broken!"
        - "{broken} returned broken!"

estimates:
    no-estimate-help: There is no estimate yet.
    no-beneficiary-billable-help: >-
        You can't create an estimate for an event without at least one beneficiary.
    contact-someone-to-create-estimate: >-
        If needed, contact a member of the team and ask them to create an estimate.

    actions:
        create:
            label: Create an estimate...
            help: >-
                You can create an estimate for the first beneficiary of the event
                by clicking on the button below.
        create-new:
            label: Create a new estimate...
            help: >-
                You can create a new estimate by clicking the button below.

    warnings:
        beneficiary-not-invoiceable:
            message:
                with-estimates:
                    "The beneficiary \"{name}\" has incomplete or invalid billing data.\n
                    To generate a new estimate, please complete or correct its information."
                without-estimates:
                    "The beneficiary \"{name}\" has incomplete or invalid billing data.\n
                    To generate an estimate, please complete or correct its information."
            action: Edit details

        empty:
            message: |-
                This event's billing does not contain any displayed lines.
                To generate an estimate, please add materials or lines in the editor.
            action: Edit billing
    item:
        title:
            with-number: "Estimate No.\_{number}"
            without-number: "Estimate of {date} at {hour}"

    modals:
        create:
            title: 'New estimate for event "{name}"'
            action: Create estimate
            created: The estimate has been created successfully.
            fields:
                lang:
                    label: Estimate language
                    options:
                        fr: French
                        en: English
                special-mentions: Special mentions
                due-date:
                    label: Due date
                    placeholder: "Valid for {days} days"

invoices:
    no-invoice-help: There is no invoice yet.
    no-beneficiary-billable-help: >-
        You can't create an invoice for an event without at least one beneficiary.
    contact-someone-to-create-invoice: >-
        If needed, contact a member of the team and ask them to edit the invoice.

    actions:
        create:
            label: Create an invoice...
            help: >-
                You can create a new invoice for the first beneficiary of the event
                by clicking on the button below.
        create-new:
            label: Create a new invoice...
            help: >-
                You can create a new invoice by clicking the button below.

    warnings:
        beneficiary-not-invoiceable:
            message:
                with-invoices:
                    "The beneficiary \"{name}\" has incomplete or invalid billing data.\n
                    To generate a new invoice, please complete or correct its information."
                without-invoices:
                    "The beneficiary \"{name}\" has incomplete or invalid billing data.\n
                    To generate an invoice, please complete or correct its information."
            action: Edit details

        empty:
            message: |-
                This event's billing does not contain any displayed lines.
                To generate an invoice, please add materials or lines in the editor.
            action: Edit billing

    item:
        title:
            invoice: "Invoice No.\_{number}"
            correction: "Corrective invoice No.\_{number}"
            prepayment-invoice: "Prepayment invoice No.\_{number}"
            prepayment-credit-note: "Credit note No.\_{number}"
            credit-note: "Credit note No.\_{number}"

            draft:
                invoice: "Invoice of {date} at {hour}"
                correction: "Corrective invoice of {date} at {hour}"
                prepayment-invoice: "Prepayment invoice of {date} at {hour}"
                prepayment-credit-note: "Credit note of {date} at {hour}"
                credit-note: "Credit note of {date} at {hour}"

    modals:
        create:
            title: 'New invoice for event "{name}"'
            action: Create invoice
            created: The invoice has been created successfully.
            fields:
                order-number: Purchase order number
                special-mentions: Special mentions
                lang:
                    label: Invoice language
                    options:
                        fr: French
                        en: English
                due-date:
                    label: Due date
                    placeholder:
                        immediately: Payment due on receipt
                        with-delay:
                            - "Payment due in %d day"
                            - "Payment due in %d days"

documents:
    confirm-permanently-delete: Do you really want to permanently delete this document?
    deleted: Document deleted.

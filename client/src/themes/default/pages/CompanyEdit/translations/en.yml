invoice-routing-identifier-customize:
    label: Customize e-invoicing identifier?
    help: >-
        By default, the e-invoicing routing identifier is automatically inferred from the
        business registration number. If the client has provided you with a specific
        identifier (e.g. with a routing suffix), you can enter it here.

invoice-routing-identifier:
    label: E-invoicing routing identifier
    help: |-
        Identifier used to route electronic invoices to the correct recipient.
        You can obtain this information directly from the client.

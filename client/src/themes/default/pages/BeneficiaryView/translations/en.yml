title-simple: Details of beneficiary
title: "Beneficiary: \"{name}\""

warnings:
    not-invoiceable:
        with-company:
            message: |-
                The billing details of the company linked to this beneficiary are incomplete or invalid.
                Please complete or correct this information in order to generate estimates or invoices for this beneficiary.
            action: Edit company
        without-company:
            message: |-
                This beneficiary's billing details are incomplete or invalid.
                Please complete or correct this information in order to generate estimates or invoices for this beneficiary.
            action: Edit beneficiary

#
# - Tabs
#

infos:
    user-account: User account
    borrowings-count: Borrowings count
    no-borrowing: None.
    next-borrowings-title: Current and future borrowings
    no-borrowing-planned: No reservations or events planned.

billing:
    title: Estimates & Invoices

    estimates:
        title: Estimate
        count: ["{count} estimate", "{count} estimates"]
        empty: No estimates for this beneficiary.

        columns:
            number: Number
            issue-date: Issue date
            total-without-taxes: "Amount excl. taxes"
            total-with-taxes: "Amount incl. taxes"
            status: Status

    invoices:
        title: Invoices
        count: ["{count} invoice", "{count} invoices"]
        empty: No invoices for this beneficiary.

        columns:
            number: Number
            issue-date: Issue date
            total-without-taxes: "Amount excl. taxes"
            total-with-taxes: "Amount incl. taxes"
            status: Status

borrowings:
    title: Borrowings ({count})
    nothing-to-show: This beneficiary has not taken out any borrowings.
    done: Done
    currently-mobilized: In progress
    overdue-since: Overdue since {duration}
    mobilized-starting-from: Scheduled for {date}
    initially-planned-period: Initially {period}
    late-return-on: Returned on {date} ({duration} late)

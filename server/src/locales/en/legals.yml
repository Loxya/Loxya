mentions:
    global:
        share-capital:
            short: "%s with a share capital of %s"
            full: "%s %s with a share capital of %s"

    FR:
        vat-due-on-invoice: >-
            VAT paid on debits.

        no-early-payment-discount: >-
            No discount will be granted for payments received before the due date.

        late-payment-penalty: >-
            Any late payment will result in a penalty payable from the due date,
            calculated on the basis of three times the legal interest rate.

        late-payment-flat-fee: >-
            Flat-rate compensation for collection costs in the event of late payment: €40.

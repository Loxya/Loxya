global-args:
    command: The command to execute.
    env: The environnement to use.
    help: Display help for the given command.
    quiet: Enable the silent mode.
    version: Display the Loxya version.

commands:
    #
    # - Assistant d'installation
    #

    install:
        installation-wizard: Installation Wizard
        should-configure-advanced:
            "Would you like to configure the advanced settings?"

        change-wizard-language:
            "Would you prefer to use English with this assistant?"

        database-updated-continue:
            "The database will be updated, press enter to continue..."

        headings:
            organization-information: Your organization's information
            database-configuration: Database Configuration
            estimates-parameters: Estimates parameters
            invoicing-parameters: Invoicing parameters
            application-parameters: Application parameters
            database-update: Database Update
            administrator-creation:
                title: Creation of the first user
                details: |
                    This user will be an administrator, so he will have access to
                    all aspects of the application and will have all right granted.

        statuses:
            settings-saved: Settings successfully saved.
            updating-database: Database update in progress...
            database-updated: Database successfully updated.
            installation-completed: "Installation completed, access your application via:"

        errors:
            database-update: "Critical error while updating the database."

        fields:
            base-url:
                label: Application URL
                placeholder: "E.g.: https://loxya.my-organization.com"
                hint: |-
                    This is the base URL of the application, that you'll use everyday.

            main-country:
                label: Main country of use
                hint: |-
                    This information allows Loxya to adapt to your geographical area.

            jwt-secret:
                label: Security token
                hint: |-
                    A secret string used to enforce security or your application.

            enable-cors:
                label: Enable CORS (Cross Origin Resource Sharing)
                hint: |-
                    Allows using the API from another domain (less secure).

            session-expire-hours:
                label: Sessions duration
                hint: |-
                    Maximum session duration (in hours) before the user must log in again.

            max-items-per-page:
                label: Number of items per page
                hint: |-
                    The maximum number of items displayed per page in listings.

            default-lang:
                label: Default language
                hint: |-
                    The language that Loxya will use by default for new users.

            barcodes:
                mode:
                    label: Barcode generation mode
                    hint: |-
                        In "automatic" mode, Loxya generates the barcodes content. In "manual" mode,
                        you can specify their content, but you will need to use a barcode scanner
                        that is capable of inserting a prefix and a suffix.
                    options:
                        auto: Automatic
                        manual: Manual
                format:
                    label: Format of barcodes generated by Loxya
                    options:
                        pdf417: PDF 417
                        qr-code: QR Code
                        code39: Code 39
                        code128: Code 128

            database:
                fields:
                    host: Database Host
                    username: Username
                    password:
                        label: Password
                        update:
                            placeholder: "- Current password -"
                            hint: Leave empty to keep the current password.
                    database: Database Name
                    port: Port
                    prefix:
                        label: Table Prefix
                        hint: |-
                            An optional prefix for Loxya's tables. Leave empty in most cases.
                errors:
                    generic: Unable to connect to the database. Please check the information.
                    host-unreachable: The specified database host is unreachable.
                    bad-credentials: The database credentials are invalid.
                    missing-database: No database seems to exist with that name.

            billing-mode:
                label: Usage mode
                options:
                    all: "Equipment rental: Systematic billing."
                    partial: "Equipment rental + Loan: Case-by-case billing."
                    none: "Equipment loan: No billing at all."

            currency:
                label: Currency
                hint:
                    without-billing: |-
                        Used for equipment replacement prices for example.
                    with-billing: |-
                        Used for displaying prices and for billing.

            organization:
                name:
                    without-billing: |-
                        Organization name
                    with-billing: |-
                        Legal name of the organization
                registration-id:
                    generic: "Business registration number"
                    FR: "SIRET number"
                    BE: "BCE number"
                    CH: "IDE number"
                    CD: "RCCM number"
                trade-registry-city:
                    label: City of the organization's trade registry
                    hint: |-
                        This information will appear on generated documents.
                legal-type: Legal Form
                share-capital:
                    label: Share Capital
                    hint: |-
                        This information will appear on quotes and invoices.
                is-vat-subjected: Are you subject to VAT?
                vat-exemption-reason:
                    label: Reason for VAT exemption
                    hint: |-
                        Select the corresponding reason for not being subject to VAT
                vat-exemption-reason-custom:
                    label: Specify the VAT exemption reason
                    hint: |-
                        This will appear on generated documents.
                        If left empty, transactions will be considered outside the scope of VAT.
                activity-code:
                    generic: "Business activity code"
                    FR: "APE code"
                    BE: "NACE code"
                    CH: "NOGA code"
                vat-number:
                    generic: "VAT number"
                    CA: "Tax number"
                    CD: "NIF number"
                vat-due-on-invoice:
                    label: Option for VAT payment upon invoicing?
                    hint: |-
                        If VAT becomes payable when invoices are issued instead of when payments are received.
                phone:
                    label: Organization phone number
                    hint: |-
                        The phone number that will be displayed on documents / e-mails (optional).
                email:
                    label: Organization e-mail address
                    hint: |-
                        E-mail address that will be displayed on documents (optional).
                country:
                    label: Organization's country
                    errors:
                        currency-mismatch: "The application currency is not compatible with this country."
                street:
                    - Street address
                    - Street address (line 2)
                administrative-area:
                    area: "Area"
                    canton: "Canton"
                    county: "County"
                    department: "Department"
                    district: "District"
                    do_si: "Do/Si"
                    emirate: "Emirate"
                    island: "Island"
                    parish: "Parish"
                    prefecture: "Prefecture"
                    province: "Province"
                    region: "Region"
                    state: "State"
                postal-code:
                    eircode: "Eircode"
                    pin: "PIN code"
                    postal: "Postal code"
                    zip: "ZIP code"
                locality:
                    city: "City"
                    district: "District"
                    post_town: "Post town"
                    suburb: "Suburb"
                    town_city: "Town/City"

            return-policy:
                label: Equipment Return Policy
                hint:
                    "How should the software close events or bookings?"
                options:
                    auto: "Automatic closure: The event ends on the scheduled date, even without an inventory."
                    manual: "Manual closure: The event remains active until a manual inventory is performed."

            estimates:
                validity-days:
                    label: Default estimate validity period
                    hint: |-
                        Validity period to apply to estimates when no due date is specified.
                    options:
                        days: "%d days"
                        custom: "Custom..."
                    custom-label: Custom validity period (in days)

            invoices:
                routing-identifier:
                    label: E-invoicing sending address
                    hint: |-
                        It must match the one registered with your sending platform.
                payment-term-days:
                    label: Default payment term
                    hint: |-
                        Payment term to indicate on invoices when no due date is specified.
                    options:
                        on-receipt: "Upon receipt"
                        days: "%d days"
                        custom: "Custom..."
                    custom-label: Custom payment term (in days)
                payment-methods:
                    label: Accepted payment methods
                    hint: |-
                        Use the space bar to select one or more options.
                    options:
                        cash: Cash
                        card: Credit / Debit Card
                        cheque: Cheque
                        transfer:
                            label: Bank transfer
                            details:
                                iban: "Bank account IBAN"
                                bic: "BIC / SWIFT code"
                                holder:
                                    label: "Account holder name"
                                    hint: |-
                                        Defaults to the organization's legal name if left empty.

            administrator:
                fields:
                    first-name: First name - Main administrator
                    last-name: Last name - Main administrator
                    pseudo:
                        label: Username - Main administrator
                        hint: |
                            Used to log in to the application and as an identifier within the application.
                    password:
                        label: Password - Main administrator
                        hint: |
                            Used to log in to the application with this user.
                    email:
                        label: E-mail address - Main administrator
                        hint: |
                            Note: Can also be used to log in to the application.
                        placeholder: your-address@your-company.com
                errors:
                    validation: |
                        Some user data are invalid. Please verify it.

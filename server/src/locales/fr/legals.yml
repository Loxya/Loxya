mentions:
    global:
        share-capital:
            short: "%s au capital de %s"
            full: "%s %s au capital de %s"

    FR:
        vat-due-on-invoice: >-
            TVA acquittée sur les débits.

        no-early-payment-discount: >-
            Les règlements reçus avant la date d'échéance ne donneront pas lieu à escompte.

        late-payment-penalty: >-
            Tout retard de paiement engendre une pénalité exigible à compter de la
            date d'échéance, calculée sur la base de trois fois le taux d'intérêt légal.

        late-payment-flat-fee: >-
            Indemnité forfaitaire pour frais de recouvrement en cas de retard de paiement : 40 €.
